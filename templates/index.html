<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Persona Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #333; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; resize: vertical; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #007bff; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 25px; padding: 20px; background: #e9ecef; border-radius: 8px; white-space: pre-wrap; display: none; line-height: 1.6; }
        .loading { text-align: center; color: #666; display: none; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Target Customer Persona Generator</h1>
    <textarea id="promptInput" placeholder="Apne business ya product ke baare mein likhein (e.g., An online shoe store for fitness enthusiasts)..."></textarea>
    <button onclick="generatePersona()">Generate Persona ✨</button>

    <div class="loading" id="loadingText">AI aapka customer persona soch raha hai... Please wait...</div>
    <div id="result"></div>
</div>

<script>
async function generatePersona() {
    const prompt = document.getElementById('promptInput').value;
    const resultDiv = document.getElementById('result');
    const loadingText = document.getElementById('loadingText');

    if (!prompt.trim()) {
        alert("Pehle kuch likhiye toh sahi!");
        return;
    }

    resultDiv.style.display = 'none';
    loadingText.style.display = 'block';

    try {
        const response = await fetch('/generate-persona', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt })
        });
        
        const data = await response.json();
        
        loadingText.style.display = 'none';
        
        if (data.success) {
            // ✅ Fixed: Properly rendered as HTML design now!
            resultDiv.innerHTML = data.persona; 
            resultDiv.style.display = 'block';
        } else {
            alert("Error: " + data.error);
        }
    } catch (error) {
        loadingText.style.display = 'none';
        alert("Something went wrong!");
    }
}
</script>
</body>
</html>
